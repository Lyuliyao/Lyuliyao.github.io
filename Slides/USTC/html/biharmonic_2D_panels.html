<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Biharmonic 2D Panels</title>
	<style>
		html,
		body {
			margin: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			background: #ffffff;
		}

		.plot-crop {
			position: relative;
			width: 660px;
			height: 600px;
			overflow: hidden;
			background: #ffffff;
		}

		.plot-crop iframe {
			position: absolute;
			top: -10px;
			left: -6px;
			width: 610px;
			height: 335px;
			border: 0;
			transform: scale(1.86);
			transform-origin: top left;
			background: #ffffff;
		}
	</style>
</head>
<body>
	<div class="plot-crop">
		<iframe src="./biharmonic_2D_all.html" title="Biharmonic convergence subplots"></iframe>
	</div>
</body>
</html>
